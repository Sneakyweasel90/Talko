stages:
  - build
  - release

build-linux:
  stage: build
  image: node:20
  rules:
    - if: $CI_COMMIT_TAG =~ /^v.*/
    - if: $CI_COMMIT_BRANCH == "master"
  script:
    - cd client
    - npm install
    - npm run build
    - npx electron-builder --linux
  artifacts:
    paths:
      - client/dist_electron/*.AppImage
    expire_in: 1 hour